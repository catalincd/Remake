name: mamba_coarse
model: mamba
label_space: coarse11
data: {max_per_class: 15000, val_max_per_class: 4000}
train: {epochs: 20, batch_size: 128, lr: 1.0e-3, weight_decay: 0.05, warmup_pct: 0.1, augment: true, gbflip_sigma: 0.01}
model_args: {d_model: 128, n_down: 4, n_blocks: 4, d_state: 16}
notes: "Pure-torch selective SSM. n_down=4 -> 256 tokens keeps the scan cheap."
