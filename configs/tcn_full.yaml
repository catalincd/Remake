name: tcn_full
model: tcn
label_space: coarse11
data:
  max_per_class: null          # FULL 6.14M train
  val_max_per_class: 20000      # cap val/test eval to 220k (reliable acc, fast epochs)
train:
  epochs: 20
  batch_size: 256
  lr: 1.0e-3
  weight_decay: 0.05
  warmup_pct: 0.05
  augment: true
  gbflip_sigma: 0.01
  amp: true
  early_stop_patience: 4         # stop if val_acc stalls (don't waste days)
  num_workers: 6                 # lower while xgb is hogging CPU cores
model_args:
  channels: 128
  kernel: 5
  n_levels: 8                   # dilations 1..128 -> receptive field covers the whole seq
  stem_pool: 8                  # 4096 -> 512 tokens (cheaper than the coarse cfg's 1024)
  dropout: 0.1
notes: "Dilated TCN on FULL data, coarse-11. ~ comparable to transformer_full in cost on a 6750 XT."
