name: transformer_large
model: transformer
label_space: coarse11
data: {max_per_class: 80000, val_max_per_class: 15000}   # ~880k train, tractable
train:
  epochs: 20
  batch_size: 192
  lr: 8.0e-4
  weight_decay: 0.05
  warmup_pct: 0.1
  augment: true
  gbflip_sigma: 0.01
  amp: true
  early_stop_patience: 4
  num_workers: 6
model_args: {d_model: 192, n_down: 4, nhead: 6, n_layers: 4}
notes: "Byte Transformer on a large subset (~880k). ~10-20 min/epoch on a 6750 XT."
